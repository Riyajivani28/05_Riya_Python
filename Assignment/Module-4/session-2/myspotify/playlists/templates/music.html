<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#121212,#1e1e1e);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:450px;
            background:#222;
            padding:30px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
            text-align:center;
        }

        h1{
            color:#1DB954;
            margin-bottom:20px;
        }

        ul{
            list-style:none;
            padding:0;
        }

        li{
            background:#333;
            margin:12px 0;
            padding:15px;
            border-radius:10px;
            font-size:18px;
            transition:.3s;
            cursor:pointer;
        }

        li:hover{
            background:#1DB954;
            transform:scale(1.05);
        }

        a{
            display:inline-block;
            margin-top:25px;
            padding:12px 25px;
            background:#1DB954;
            color:white;
            text-decoration:none;
            border-radius:30px;
            font-size:18px;
            transition:.3s;
        }

        a:hover{
            background:#17a74a;
            transform:scale(1.08);
        }
    </style>

</head>
<body>

<div class="container">

<h1>🎵 My Playlist 🎵</h1>

<ul>
    <li>🎶 Blinding Lights</li>
    <li>🎶 Perfect</li>
    <li>🎶 Heeriye</li>
    <li>🎶 Kesariya</li>
    <li>🎶 O Maahi</li>
    <li>🎶 Apna Bana Le</li>
    <li>🎶 Until I Found You</li>
    <li>🎶 Beautiful Things</li>
    <li>🎶 Saiyaara</li>
    <li>🎶 Vhalam Aavo Ne</li>
</ul>

<a href="/">🏠 Back to Home</a>

</div>

</body>
</html>
